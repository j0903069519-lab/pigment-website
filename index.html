<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>稻花香顏料訂購</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="app-shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">Pigment order</p>
          <h1>稻花香顏料訂購</h1>
        </div>
        <div class="topbar__meta">
          <span id="productCount">0 款顏料</span>
          <span id="selectedCount">已選 0 件</span>
        </div>
      </header>

      <aside class="checkout-panel checkout-panel--top" aria-label="訂單與收件資料">
        <div class="checkout-summary">
          <div class="panel-heading compact">
            <div>
              <h2>訂單</h2>
              <p id="cartSummary">尚未選擇顏料</p>
            </div>
            <button id="clearCart" class="ghost-button" type="button">清空</button>
          </div>

          <div id="cartItems" class="cart-items empty">選好顏料後會顯示在這裡</div>
        </div>

        <form id="orderForm" class="order-form">
          <label>
            <span>收件人</span>
            <input name="recipient" autocomplete="name" required>
          </label>
          <label>
            <span>電話</span>
            <input name="phone" autocomplete="tel" inputmode="tel" required>
          </label>
          <label class="wide-field">
            <span>收件地址</span>
            <textarea name="address" rows="2" autocomplete="street-address" required></textarea>
          </label>
          <label class="wide-field">
            <span>備註</span>
            <textarea name="note" rows="2" placeholder="可填希望出貨時間、替代色等"></textarea>
          </label>
          <button id="submitOrder" class="primary-button" type="submit">送出訂單並付款</button>
        </form>
      </aside>

      <section class="order-layout">
        <aside class="filters" aria-label="顏料篩選">
          <label class="field-label" for="searchInput">搜尋名稱或色號</label>
          <div class="search-box">
            <span aria-hidden="true">⌕</span>
            <input id="searchInput" type="search" placeholder="例如：稻花香、鴉羽、10">
          </div>

          <div class="filter-block">
            <div class="field-label">色系</div>
            <div id="colorFilters" class="color-filters"></div>
          </div>
        </aside>

        <section class="catalog-panel" aria-label="顏料清單">
          <div class="panel-heading">
            <div>
              <h2>選擇顏料</h2>
              <p id="resultSummary">正在載入顏料資料</p>
            </div>
            <button id="clearFilters" class="ghost-button" type="button">清除篩選</button>
          </div>
          <div id="paginationTop" class="pagination" aria-label="商品分頁"></div>
          <div id="productGrid" class="product-grid"></div>
          <div id="paginationBottom" class="pagination pagination--bottom" aria-label="商品分頁"></div>
        </section>
      </section>
    </main>

    <dialog id="orderDialog">
      <form method="dialog" class="dialog-card">
        <div class="panel-heading compact">
          <div>
            <h2>訂單內容</h2>
            <p id="dialogStatus">訂單建立後會在 LINE 內完成付款與客服</p>
          </div>
          <button class="icon-button" value="close" aria-label="關閉" type="submit">×</button>
        </div>
        <textarea id="orderText" class="order-text" readonly></textarea>
        <div class="dialog-actions">
          <button id="copyOrder" class="secondary-button" type="button">複製文字</button>
          <button id="closeDialog" class="primary-button" value="close" type="submit">完成</button>
        </div>
      </form>
    </dialog>

    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <script src="app.js"></script>
  </body>
</html>
